name: Build Installers

# On-demand unsigned installers you can download from the run's Artifacts.
# No repo secrets needed: an EPHEMERAL updater key is generated per run so
# bundling (which signs updater artifacts) succeeds. The installers themselves
# are fine to install; only in-app auto-update won't trust them (wrong key) and
# there's no OS codesigning (macOS: right-click Open or `xattr -d
# com.apple.quarantine`; Windows: SmartScreen "More info -> Run anyway").
#
# For a real, updatable, signed release use release.yml with the actual
# TAURI_SIGNING_PRIVATE_KEY secret set.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis,msi --config noupd.json"
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin --bundles app,dmg --config noupd.json"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage --config noupd.json"

    runs-on: ${{ matrix.platform }}
    env:
      # AppImage's linuxdeploy needs FUSE (absent on runners); extract instead.
      APPIMAGE_EXTRACT_AND_RUN: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      # tauri.conf.json has a pubkey + createUpdaterArtifacts, so the bundler
      # would demand a signing key. We only want the raw installers, so merge a
      # config override that turns updater artifacts off - no key needed. A FILE
      # (not inline JSON) so the Windows shell can't mangle the quotes. Tauri
      # resolves --config paths from the cwd (repo root).
      - name: Disable updater artifacts
        shell: bash
        run: echo '{"bundle":{"createUpdaterArtifacts":false}}' > noupd.json

      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Call the tauri CLI directly. The default `npm run tauri` goes through
          # scripts/tauri.mjs, which MOVES the built installers into build/<version>/
          # after every build - so upload-artifact (and tauri-action's own artifact
          # scan) would find nothing at the bundle paths.
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
          if-no-files-found: error
