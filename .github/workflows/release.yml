name: Release

# Build, (optionally) sign, and publish the installers for every platform, then
# emit the multi-platform `latest.json` feed that the in-app updater reads.
#
# Matrix (cross-platform-plan.md Phase 5): one job per OS, all attaching to the
# SAME draft release (same tagName). tauri-action merges every platform's
# updater artifacts into a single `latest.json`, so the existing updater
# endpoint keeps working unchanged.
#   - windows-latest : nsis + msi (+ updater); needs libclang for bindgen.
#   - macos-latest   : universal .app + dmg (+ updater); whisper.cpp builds with
#                      Metal via the Xcode CLT, so no libclang step.
#   - ubuntu-22.04   : deb + rpm + appimage (+ updater); same system deps as ci.yml.
#
# Variant (parity Phase B): this workflow builds ONE variant - the CPU
# local-whisper build - and that variant is the updater channel.
# tauri-plugin-updater has a single `latest.json` per platform, so a second
# variant cannot share the feed. The CUDA variant (`local-whisper-cuda`) is a
# power-user artifact built locally with `node scripts/release.mjs --cuda`
# (it needs a CUDA toolkit the runners don't have) and attached to the GitHub
# release manually, clearly labelled; it must never be referenced from
# `latest.json`.
#
# No model is bundled - the installer stays small; onboarding offers the
# download (Cloud vs Private fork).
#
# Trigger by pushing a tag like `v0.1.0`, or run it manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--features local-whisper --bundles nsis,msi,updater"
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--features local-whisper --target universal-apple-darwin --bundles app,dmg,updater"
          - platform: ubuntu-22.04
            args: "--features local-whisper --bundles deb,rpm,appimage,updater"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        # macOS builds a universal binary; add both arches for the target above.
        with:
          targets: ${{ matrix.target && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri's Linux build needs system libraries (WebKitGTK, GTK, appindicator,
      # librsvg), and the platform backends add ALSA, libxkbcommon, and libdbus
      # (the last for the Secret Service keyring). patchelf is needed for AppImage.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            patchelf

      # On-device speech-to-text (`local-whisper`) builds whisper.cpp from
      # source. CMake + MSVC ship on windows-latest; bindgen additionally needs
      # libclang, so point it at the runner's preinstalled LLVM. macOS/Linux
      # bindgen finds libclang from the system toolchain, so no step there.
      - name: Locate libclang (for bindgen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $llvm = if ($env:LLVM_PATH) { "$env:LLVM_PATH\bin" } else { "C:\Program Files\LLVM\bin" }
          echo "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # AppImage's linuxdeploy tooling normally mounts via FUSE, which GitHub
          # runners don't provide - extract-and-run instead so bundling doesn't
          # hang/crash. No-op on Windows/macOS.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Updater artifact signing (required so `latest.json` is signed and the
          # in-app updater trusts the bundle). Generate with `tauri signer generate`
          # and put the PUBLIC key in tauri.conf.json `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Optional Apple signing/notarization. Leave unset to ship an unsigned
          # build; users then right-click-Open or clear the quarantine attribute
          # (`xattr -d com.apple.quarantine`) - see README distribution notes.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Optional Authenticode / Azure Trusted Signing of the Windows installer.
          # Leave unset to ship an unsigned (SmartScreen-warned) build.
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Eve ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          # Per-OS bundles + the updater artifacts/`latest.json`, compiling
          # on-device whisper.cpp (`local-whisper`, CPU) - the updater-channel
          # build. Bundle list varies per platform (see the matrix above).
          args: ${{ matrix.args }}
