name: Release

# One-click release, run entirely in CI so you never build locally again.
#
# Trigger: Actions tab -> "Release" -> Run workflow, with an optional version.
#   - version blank        -> bumps the PATCH number (0.1.0 -> 0.1.1)
#   - version set (x.y.z)  -> uses exactly that version
#
# It then, on the branch you dispatch from:
#   1. bumps package.json / tauri.conf.json / Cargo.toml (+ Cargo.lock) in lockstep,
#   2. commits "chore(release): vX.Y.Z" and pushes a matching tag,
#   3. builds the Windows CUDA + Parakeet installer, and
#   4. publishes a draft GitHub release with the .exe / .msi attached.
#
# Build variant (per the owner's setup): local-whisper-cuda + local-parakeet.
# Whisper runs on the GPU, Parakeet on the CPU, polish via Groq. The installer
# is UNSIGNED and needs no repo secrets - Windows SmartScreen shows
# "More info -> Run anyway" the first time; in-app auto-update is off (no key).
#
# CUDA note: mirrors the machine-local .cargo/config.toml (gitignored, so absent
# here) - Ninja generator, sm_120 (Blackwell / RTX 50-series), and nvcc's
# -allow-unsupported-compiler. The CUDA toolkit version below should match what
# the target machine has installed so the cublas/cudart runtime DLLs resolve.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version x.y.z (leave blank to bump the patch number)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  # Mirror the verified local CUDA build config (normally in the gitignored
  # src-tauri/.cargo/config.toml). Ninja invokes nvcc directly; sm_120 targets
  # Blackwell; the prepend flag lets nvcc accept the runner's MSVC.
  CMAKE_GENERATOR: Ninja
  CUDAARCHS: "120"
  NVCC_PREPEND_FLAGS: "-allow-unsupported-compiler"

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + write token so the version-bump commit and tag push.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # x64 MSVC env so Ninja/nvcc find cl.exe (the CUDA build needs it).
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        shell: pwsh
        run: choco install ninja -y

      # No GPU is needed to BUILD CUDA code, only the toolkit (nvcc + cublas).
      # Version should match the target machine's installed CUDA so the runtime
      # DLLs (cublas64_*, cudart64_*) resolve at launch.
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.24
        id: cuda
        with:
          cuda: "13.0.0"
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust"]'

      # whisper.cpp builds from source (local-whisper-cuda); bindgen needs
      # libclang. windows-latest ships LLVM at C:\Program Files\LLVM.
      - name: Locate libclang (for bindgen)
        shell: pwsh
        run: |
          $llvm = if ($env:LLVM_PATH) { "$env:LLVM_PATH\bin" } else { "C:\Program Files\LLVM\bin" }
          echo "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Bump version, commit & tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/bump-version.mjs "${VERSION:-patch}"
          NEW=$(node -e "process.stdout.write(require('./package.json').version)")
          # Keep Cargo.lock's own package version in step (no dep upgrades).
          cargo metadata --manifest-path src-tauri/Cargo.toml --format-version 1 >/dev/null
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore(release): v$NEW"
          git tag "v$NEW"
          # Push the bump commit back to the dispatched branch (checkout may be a
          # detached HEAD, so name the branch explicitly) plus the new tag.
          git push origin "HEAD:$GITHUB_REF_NAME" "refs/tags/v$NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Install frontend deps
        run: npm ci

      # tauri.conf.json enables updater artifacts (which demand a signing key).
      # We ship unsigned, so override that off via a --config file - no key,
      # no secrets. A file (not inline JSON) so the shell can't mangle quotes.
      - name: Disable updater artifacts (unsigned build)
        shell: bash
        run: echo '{"bundle":{"createUpdaterArtifacts":false}}' > noupd.json

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Call the tauri CLI directly. The default `npm run tauri` goes through
          # scripts/tauri.mjs, which MOVES installers into build/<version>/ after
          # the build - tauri-action would then find nothing to attach.
          tauriScript: npx tauri
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: "Eve ${{ steps.version.outputs.tag }}"
          releaseBody: |
            Windows CUDA + Parakeet build (unsigned).

            Install: download the `.exe`, run it, and on the SmartScreen prompt
            choose "More info -> Run anyway". Requires an NVIDIA GPU with the
            matching CUDA runtime for GPU Whisper; Parakeet and Groq work without it.
          releaseDraft: true
          prerelease: false
          args: "--features local-whisper-cuda,local-parakeet --bundles nsis,msi --config noupd.json"
