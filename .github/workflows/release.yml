name: Release

# Build, (optionally) sign, and publish the Windows installers, then emit the
# `latest.json` feed that the in-app updater (Phase 11) reads.
#
# Build matrix (parity Phase B): this workflow builds ONE variant - the CPU
# local-whisper build - and that variant is the updater channel.
# tauri-plugin-updater has a single `latest.json` per platform, so a second
# variant cannot share the feed. The CUDA variant (`local-whisper-cuda`) is a
# power-user artifact built locally with `node scripts/release.mjs --cuda`
# (it needs a CUDA toolkit the runners don't have) and attached to the GitHub
# release manually, clearly labelled; it must never be referenced from
# `latest.json`. Revisit only if maintaining the manual artifact becomes
# painful.
#
# No model is bundled - the installer stays small; onboarding offers the
# download (Cloud vs Private fork).
#
# Trigger by pushing a tag like `v0.1.0`, or run it manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # On-device speech-to-text (`local-whisper`) builds whisper.cpp from
      # source. CMake + MSVC ship on windows-latest; bindgen additionally needs
      # libclang, so point it at the runner's preinstalled LLVM.
      - name: Locate libclang (for bindgen)
        shell: pwsh
        run: |
          $llvm = if ($env:LLVM_PATH) { "$env:LLVM_PATH\bin" } else { "C:\Program Files\LLVM\bin" }
          echo "LIBCLANG_PATH=$llvm" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend deps
        run: npm ci

      - name: Build, sign & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (required so `latest.json` is signed and the
          # in-app updater trusts the bundle). Generate with `tauri signer generate`
          # and put the PUBLIC key in tauri.conf.json `plugins.updater.pubkey`.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Optional Authenticode / Azure Trusted Signing of the installer itself.
          # Leave unset to ship an unsigned (SmartScreen-warned) build.
          # AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          # AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Eve ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
          # Produce NSIS + MSI installers and the updater artifacts/`latest.json`,
          # and compile on-device whisper.cpp (`local-whisper`, CPU). This is the
          # updater-channel build - see the matrix note at the top of this file.
          args: --features local-whisper --bundles nsis,msi,updater
