name: Verify Bundle

# TEMPORARY verification workflow (not part of the release pipeline).
#
# Purpose: prove that `tauri build` actually produces the native installer for
# each OS - .dmg on macOS, .msi/.nsis on Windows, .deb/.AppImage on Linux -
# WITHOUT needing the updater signing key (which `release.yml` requires because
# it also emits the signed `latest.json`). We drop the `updater` bundle target
# and don't create a GitHub release; the bundles are uploaded as run artifacts.
#
# Built with default features (no `local-whisper`) on purpose: whisper.cpp
# cross-compilation is a separate axis from the bundling/.dmg mechanics this
# verifies, and skipping it keeps the run fast. Delete this file once Phase 5
# packaging is confirmed.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--bundles nsis,msi"
          - platform: macos-latest
            target: universal-apple-darwin
            args: "--target universal-apple-darwin --bundles app,dmg"
          - platform: ubuntu-22.04
            args: "--bundles deb,appimage"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build bundles (no updater / no signing)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/**/*
          if-no-files-found: error
