name: CI

# The regression gate for cross-platform work (see cross-platform-plan.md).
# Runs on every push + PR across Windows, macOS, and Linux so a change that
# breaks compilation, lint, tests, or the frontend build on ANY platform is
# caught before merge. Nothing else gates pushes today, so this is the
# highest-value guardrail while the platform backends are built out.
#
# The default feature set is used deliberately: `local-whisper` / `local-llm`
# compile whisper.cpp / llama.cpp (CMake + a C/C++ toolchain + libclang) and are
# exercised by the release workflow, not here - keeping CI fast and free of a
# native inference toolchain.

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri's Linux build needs system libraries (WebKitGTK, GTK, appindicator,
      # librsvg), and the platform backends add ALSA, libxkbcommon, and libdbus
      # (the last for the Secret Service keyring). patchelf is needed for AppImage.
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: cargo check
        working-directory: src-tauri
        run: cargo check --all-targets

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        working-directory: src-tauri
        run: cargo test
